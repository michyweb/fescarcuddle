<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css">
	<script src="/config.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
<button id="show-iframe-btn" type="button">Mostrar iframe</button>
<div id="window" class="is-hidden">
	<div id="tab-bar">
		<button id="firefox-view-btn" class="toolbar-btn" type="button" aria-label="Firefox view">
<svg
  width="80"
  height="80"
  viewBox="0 0 40 40"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>

  <!-- Tapa -->
  <path
		d="M15.6 13.9H24.4"
    stroke="#5F6368"
		stroke-width="1"
		stroke-linecap="round"
  />

  <!-- Caja -->
  <path
		d="M12.5 17.4H27.5V27.5C27.5 28.33 26.83 29 26 29H14C13.17 29 12.5 28.33 12.5 27.5V17.4Z"
    stroke="#5F6368"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Ranura frontal -->
  <path
    d="M18 21.5H22"
    stroke="#5F6368"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
		</button>
		<div id="tabs-area">
			<div id="active-tab">
				<img src="./firefox.png" class="tab-favicon" width="16" height="16" alt="">
				<span class="tab-title" id="tab-title">New Tab</span>
				<span class="tab-close">&#10005;</span>
			</div>
			<button id="new-tab-btn" class="toolbar-btn" type="button" aria-label="Nueva pestana">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
			</button>
		</div>
		<button id="tab-list-btn" class="toolbar-btn" type="button" aria-label="Lista de pestanas">
			<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 9l5 5 5-5"></path></svg>
		</button>
		<div id="window-controls">
			<span id="minimize"></span>
			<span id="square"></span>
			<span id="exit">&#10005;</span>
		</div>
	</div>

	<div id="nav-bar">
		<button id="sidebar-btn" class="nav-btn" type="button" aria-label="Panel lateral">
			<svg viewBox="0 0 24 24" aria-hidden="true">
				<rect x="6" y="10" width="3" height="9" rx="1" fill="currentColor"></rect>
				<rect x="5" y="7" width="17" height="14" rx="1.2"></rect>
				<path d="M9.2 7v10"></path>
			</svg>
		</button>
		<div id="nav-buttons">
			<span class="nav-btn" id="btn-back">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12H6"></path><path d="M11 7l-5 5 5 5"></path></svg>
			</span>
			<span class="nav-btn" id="btn-forward">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h14"></path><path d="M13 7l5 5-5 5"></path></svg>
			</span>
			<span class="nav-btn" id="btn-reload">
				<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.34 5.66"></path><path d="M22 4v7h-7"></path></svg>
			</span>
		</div>
		<div id="address-bar">
			<div id="address-settings-btn">
				<svg class="shield-icon" viewBox="0 0 24 24" aria-hidden="true">
					<path d="M12 4.8l6 2.1v4.7c0 4.1-2.4 7.1-6 8.6-3.6-1.5-6-4.5-6-8.6V6.9z"></path>
					<path d="M9.2 12.1l1.9 1.9 3.8-4"></path>
				</svg>
<svg
  width="18"
  height="18"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <!-- Línea superior -->
  <path
    d="M4 8H14"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Círculo superior derecho -->
  <circle
    cx="18"
    cy="8"
    r="2"
    stroke="currentColor"
    stroke-width="1.5"
  />

  <!-- Círculo inferior izquierdo -->
  <circle
    cx="6"
    cy="16"
    r="2"
    stroke="currentColor"
    stroke-width="1.5"
  />

  <!-- Línea inferior -->
  <path
    d="M10 16H20"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg></div>
			<div id="address-text">
				<span id="domain-name"></span><span id="domain-path"></span>
			</div>
		</div>
		<div id="browser-actions" aria-hidden="true">
			<svg class="action-icon download-action" viewBox="0 0 24 24"><path d="M12 4v10"></path><path d="M8 10l4 4 4-4"></path><path d="M6 19h12"></path></svg>
			<span class="vpn-badge"><span class="vpn-x">&#10005;</span>VPN<span class="vpn-dot"></span></span>
			<svg class="action-icon profile-action" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.2"></circle><circle cx="12" cy="9.4" r="2.4"></circle><path d="M7.8 17c.8-2.4 2.3-3.6 4.2-3.6s3.4 1.2 4.2 3.6"></path></svg>
			<svg class="action-icon extensions-action" viewBox="0 0 24 24"><path d="M9.2 5.2h4.5v4h3.8a2 2 0 0 1 2 2v3.2a2 2 0 0 1-2 2h-2.1v2.4H6.2v-4H3.8V9.2h5.4z"></path></svg>
			<svg class="action-icon menu-icon" viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h14"></path></svg>
		</div>
	</div>

	<div id="site-info-panel" aria-hidden="true">
		<div class="site-panel-header">
			<span class="site-panel-close" id="site-panel-close">&#10005;</span>
		</div>
		<div id="site-panel-message"></div>
		<div class="site-panel-row">
			<div class="site-panel-left">
				<span class="site-panel-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none"><path d="M7 10V8a5 5 0 1 1 10 0v2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="11" rx="2" stroke="currentColor" stroke-width="2.2"/></svg>
				</span>
				<span>Connection is secure</span>
			</div>
			<span class="site-panel-chevron">&#8250;</span>
		</div>
		<div class="site-panel-divider"></div>
		<div class="site-panel-row">
			<div class="site-panel-left">
				<span class="site-panel-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none"><path d="M12 4a4 4 0 0 0-4 4v4.8L6 15v1h12v-1l-2-2.2V8a4 4 0 0 0-4-4z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/><path d="M10.5 18a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
				</span>
				<span>Notifications</span>
			</div>
			<div class="site-toggle" aria-hidden="true"><span class="site-toggle-knob"></span></div>
		</div>
		<button class="site-panel-action" type="button">Reset permission</button>
		<div class="site-panel-divider"></div>
		<div class="site-panel-row">
			<div class="site-panel-left">
				<span class="site-panel-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none"><path d="M10.8 3h2.4l.5 2.1a7.2 7.2 0 0 1 1.8.8l1.9-1 1.7 1.7-1 1.9a7.2 7.2 0 0 1 .8 1.8L21 10.8v2.4l-2.1.5a7.2 7.2 0 0 1-.8 1.8l1 1.9-1.7 1.7-1.9-1a7.2 7.2 0 0 1-1.8-.8L13.2 21h-2.4l-.5-2.1a7.2 7.2 0 0 1-1.8-.8l-1.9 1-1.7-1.7 1-1.9a7.2 7.2 0 0 1-.8-1.8L3 13.2v-2.4l2.1-.5a7.2 7.2 0 0 1 .8-1.8l-1-1.9 1.7-1.7 1.9 1a7.2 7.2 0 0 1 1.8-.8L10.8 3z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="2.2"/></svg>
				</span>
				<span>Site settings</span>
			</div>
			<span class="site-panel-chevron">&#8599;</span>
		</div>
	</div>

	<div id="firefox-sidebar" aria-hidden="true">
		<div class="sidebar-icons">
			<span class="sidebar-import">
			</span>
			
			<span class="sidebar-icon has-dot">
				<svg viewBox="0 0 24 24"><path d="M12.2 7.2l1.6 3.4 3.4 1.6-3.4 1.6-1.6 3.4-1.6-3.4-3.4-1.6 3.4-1.6z"></path><path d="M5.8 3.8v3.4"></path><path d="M4.1 5.5h3.4"></path><path d="M6.5 16.2v2.8"></path><path d="M5.1 17.6h2.8"></path></svg>
			</span>
			<span class="sidebar-icon">
				<svg viewBox="0 0 24 24"><rect x="7.2" y="6.8" width="9.6" height="7.2" rx="1.1"></rect><path d="M10.2 14v2.4h3.6V14"></path><path d="M8.2 17.2h7.6"></path><path d="M16.8 11.2h1.4a1.2 1.2 0 0 1 1.2 1.2v3.8a1.2 1.2 0 0 1-1.2 1.2h-1.4"></path></svg>
			</span>
			<span class="sidebar-icon">
				<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"></circle><path d="M12 8v4l2.8 2"></path></svg>
			</span>
			<span class="sidebar-icon">
				<svg viewBox="0 0 24 24"><path d="M12 4.3l2.3 4.6 5 .7-3.6 3.5.9 5-4.6-2.4-4.6 2.4.9-5-3.6-3.5 5-.7z"></path></svg>
			</span>
		</div>
		<span class="sidebar-icon sidebar-settings">
			<svg viewBox="0 0 24 24"><path d="M10.7 4h2.6l.5 2.1c.6.2 1.1.4 1.6.7l1.9-1 1.8 1.8-1 1.9c.3.5.5 1 .7 1.6l2.2.5v2.6l-2.2.5c-.2.6-.4 1.1-.7 1.6l1 1.9-1.8 1.8-1.9-1c-.5.3-1 .5-1.6.7l-.5 2.1h-2.6l-.5-2.1c-.6-.2-1.1-.4-1.6-.7l-1.9 1-1.8-1.8 1-1.9c-.3-.5-.5-1-.7-1.6L3 14.2v-2.6l2.2-.5c.2-.6.4-1.1.7-1.6l-1-1.9 1.8-1.8 1.9 1c.5-.3 1-.5 1.6-.7z"></path><circle cx="12" cy="12.9" r="2.7"></circle></svg>
		</span>
	</div>

	<iframe id="content" class="is-hidden" frameBorder="0"></iframe>
</div>
</body>
<script src="/script.js"></script>
</html>
