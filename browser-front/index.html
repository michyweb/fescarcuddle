<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="/config.js"></script>
	<script>
		(function () {
			var variantStorageKey = "fescarcuddle.variant";
			var allowedVariants = {
				"MacOS-Chrome": true,
				"MacOS-Safari": true,
				"Windows-Chrome": true,
				"Windows-Firefox": true,
				"MacOS-Chrome-LightMode": true,
				"MacOS-Chrome-DarkMode": true
			};

			function normalizeVariant(raw) {
				if (typeof raw !== "string") return "";
				var value = raw.trim();
				if (!allowedVariants[value]) return "";
				if (value === "MacOS-Chrome-LightMode" || value === "MacOS-Chrome-DarkMode") {
					return "MacOS-Chrome";
				}
				return value;
			}

			var storedVariant = "";
			try {
				storedVariant = normalizeVariant(window.localStorage.getItem(variantStorageKey) || "");
			} catch (err) {
				storedVariant = "";
			}

			var ua = navigator.userAgent || "";
			var isMac = /Mac|iPhone|iPad|iPod/.test(ua) && !/Windows/.test(ua);
			var isSafari = /^((?!chrome|android|crios|fxios|edg).)*safari/i.test(ua);
			var isFirefox = /firefox|fxios/i.test(ua);
			var forcedVariant = storedVariant || (window.appConfig && typeof window.appConfig.variant === "string"
				? normalizeVariant(window.appConfig.variant)
				: "");
			var variant = forcedVariant || (isMac && isSafari ? "MacOS-Safari" : (isMac ? "MacOS-Chrome" : (isFirefox ? "Windows-Firefox" : "Windows-Chrome")));

			if (variant === "MacOS-Chrome-LightMode" || variant === "MacOS-Chrome-DarkMode") {
				variant = "MacOS-Chrome";
			}

			window.location.replace("/" + variant + "/" + window.location.search + window.location.hash);
		})();
	</script>
</head>
<body></body>
</html>
