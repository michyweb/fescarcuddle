<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Detectando configuración...</p>
    </div>

    <script>
        // Detectar OS
        const detectOS = () => {
            const userAgent = navigator.userAgent || '';
            if (/Mac|iPhone|iPad|iPod/.test(userAgent)) {
                return 'MacOS';
            }
            if (/Windows|Win32/.test(userAgent)) {
                return 'Windows';
            }
            return 'Windows'; // Default
        };

        // Detectar Dark Mode
        const detectDarkMode = () => {
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
        };

        // Redirect según OS y tema
        const os = detectOS();
        const isDark = detectDarkMode();
        const colorMode = isDark ? 'DarkMode' : 'LightMode';
        
        const folderName = `${os}-Chrome-${colorMode}`;
        
        console.log(`[REDIRECT] OS: ${os}, Dark Mode: ${isDark}, Redirecting to: ${folderName}/`);
        
        // Redirigir a la carpeta
        window.location.href = `/${folderName}/`;
    </script>
</body>
</html>
