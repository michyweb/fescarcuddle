services:
  caddy:
    image: caddy:latest
    container_name: caddy
    networks:
      - fescarcuddle-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  debug-server:
    build:
      context: ./url-tab-title-updater
      dockerfile: Dockerfile
    container_name: debug-server
    networks:
      - fescarcuddle-net
    volumes:
      - ./url-tab-title-updater/config.json:/app/config.json
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pescador:
    build:
      context: ./pescador
      dockerfile: Dockerfile
    container_name: pescador
    networks:
      - fescarcuddle-net
    volumes:
      - ./pescador/config.json:/app/config.json
      - pescador_data:/app/user_data
    environment:
      - NODE_ENV=production
      - DISPLAY=:99
      - MONGO_URL=mongodb://mongodb:27017/fescarcuddle
      - TARGET_URL=${TARGET_URL:-}
      - TARGET_LANGUAGE=${TARGET_LANGUAGE:-}
      - TARGET_NAME=${TARGET_NAME:-}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    privileged: true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:58082/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  browser-front:
    build:
      context: ./browser-front
      dockerfile: Dockerfile
    container_name: browser-front
    networks:
      - fescarcuddle-net
    volumes:
      - browser_front_config:/app/config
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:6
    container_name: mongodb
    networks:
      - fescarcuddle-net
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=fescarcuddle
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  pescador_data:
    driver: local
  mongodb_data:
    driver: local
  browser_front_config:
    driver: local

networks:
  fescarcuddle-net:
    driver: bridge
