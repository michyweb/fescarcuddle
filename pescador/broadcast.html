<!DOCTYPE html>
<html>
  <head>
    <title>Broadcaster</title>
    <meta charset="UTF-8" />
  </head>
  <body>
    <video playsinline autoplay muted height="140"></video>
    <canvas></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script>
//we may have to stream to multiple viewers, so keep track in a global
const peerConnections = {}
const pendingCandidatesByViewer = {}

const queueCandidate = function(viewer_socket_id, rtcCandidate){
  if(!pendingCandidatesByViewer[viewer_socket_id]){
    pendingCandidatesByViewer[viewer_socket_id] = []
  }
  pendingCandidatesByViewer[viewer_socket_id].push(rtcCandidate)
}

const flushQueuedCandidates = async function(viewer_socket_id){
  const peerConnection = peerConnections[viewer_socket_id]
  if(!peerConnection || !peerConnection.remoteDescription){
    return
  }
  const queue = pendingCandidatesByViewer[viewer_socket_id] || []
  while(queue.length > 0){
    const queued = queue.shift()
    try {
      await peerConnection.addIceCandidate(queued)
    } catch (err) {
      console.error('flushQueuedCandidates addIceCandidate failed', viewer_socket_id, err)
    }
  }
}

//const socket = io()
const urlParams = new URLSearchParams(window.location.search);
const browser_id = urlParams.get('id');
let session_id = null;
console.log('[BROADCAST] Inicializando, browser_id:', browser_id)
//create a socket and let the server know we are a new headless browser
const socket = io.connect('ws://localhost:58082', {reconnectionDelayMax: 100000, query: {browserId: browser_id}})
socket.on('connect', function() {
  console.log('[BROADCAST] Socket conectado:', socket.id)
  socket.emit('new_broadcast', browser_id)
  console.log('[BROADCAST] Emitido new_broadcast para browser_id:', browser_id)
})
socket.on('disconnect', function() {
  console.log('[BROADCAST] Socket desconectado')
})

// Receive session_id from server
socket.on('set_session_id', function(sid) {
  session_id = sid;
  console.log('Session ID set:', session_id);
})

const thumbnail = document.querySelector("video")
const canvas = window.canvas = document.querySelector('canvas')
var mainVideoStream = new ReadableStream()
let thumbnailInterval = null

const captureConstraints = { video: true, audio: false }

//var lowFrameRateVideoStream = new getDisplayMedia({'video': true}).then(function(stream){
//  const videotrack = stream.getVideoTracks()[0]
//  videotrack.applyConstraints({ frameRate: { max: 1 } })
//})
//
const getDisplayMedia = async function(constraints){
  console.log('[BROADCAST] Iniciando getDisplayMedia...')
  try {
    const timeout = new Promise((_, reject) => {
      setTimeout(() => reject(new Error('getDisplayMedia timeout after 8000ms')), 8000)
    })
    const stream = await Promise.race([
      navigator.mediaDevices.getDisplayMedia(constraints),
      timeout
    ])
    console.log('[BROADCAST] getDisplayMedia exitoso, stream:', stream)
    return stream
  } catch (err) {
    console.error('[BROADCAST] getDisplayMedia fallido:', err)
    throw err
  }
}

const ensureMainStream = async function(){
  console.log('[BROADCAST] ensureMainStream llamado')
  if(mainVideoStream && typeof mainVideoStream.getTracks === 'function' && mainVideoStream.getTracks().length > 0){
    console.log('[BROADCAST] Stream ya existe, retornando')
    return mainVideoStream
  }
  console.log('[BROADCAST] Capturando stream...')
  try {
    const stream = await getDisplayMedia(captureConstraints)
    console.log('[BROADCAST] Stream capturado:', stream)
    thumbnail.srcObject = stream
    mainVideoStream = stream
    if(!thumbnailInterval){
      console.log('[BROADCAST] Iniciando thumbnailInterval cada 2s')
      thumbnailInterval = setInterval(function(){
        if(!thumbnail.videoWidth || !thumbnail.videoHeight){
          console.log('[BROADCAST] Video aún no tiene dimensiones')
          return
        }
        canvas.width = thumbnail.videoWidth
        canvas.height = thumbnail.videoHeight
        canvas.getContext('2d').drawImage(thumbnail, 0, 0, canvas.width, canvas.height)
        let image = canvas.toDataURL()
        socket.emit("new_thumbnail", {image: image, browser_id: browser_id})
      },2000)
    }
    return stream
  } catch (err) {
    console.error('[BROADCAST] Error en ensureMainStream:', err)
    throw err
  }
}

const streamToViewer = async function(viewer_socket_id, stream, offer_type){
  if(peerConnections[viewer_socket_id]){
    try {
      peerConnections[viewer_socket_id].close()
    } catch (err) {
      console.warn('streamToViewer close existing peer failed', viewer_socket_id, err)
    }
  }

  //3) Create RTCPeerConnection and add video track
  const peerConnection = new RTCPeerConnection({ 
    iceServers: [
      {   
        "urls": "stun:stun.l.google.com:19302",
      },  
      // { 
      //   "urls": "turn:TURN_IP?transport=tcp",
      //   "username": "TURN_USERNAME",
      //   "credential": "TURN_CREDENTIALS"
      // }
    ]
  })
  peerConnections[viewer_socket_id] = peerConnection
  stream.getTracks().forEach(track => peerConnection.addTrack(track, stream))
  console.log('[BROADCAST] Tracks añadidos:', stream.getTracks().map(track => track.kind + ':' + track.readyState).join(','))
  peerConnection.onconnectionstatechange = function(){
    console.log('[BROADCAST] connectionState:', peerConnection.connectionState)
  }
  peerConnection.oniceconnectionstatechange = function(){
    console.log('[BROADCAST] iceConnectionState:', peerConnection.iceConnectionState)
  }
  
  //6) exchange ICE candidates as they become available
  peerConnection.onicecandidate = function(event){
    if (event.candidate) {
      socket.emit("candidate", viewer_socket_id, event.candidate)
    }
  }
  
  //4) send an offer to the viewer
  peerConnection
    .createOffer()
    .then(sdp => peerConnection.setLocalDescription(sdp))
    .then(() => {
      console.log('[BROADCAST] Offer creada, enviando a viewer:', viewer_socket_id)
      socket.emit(offer_type, viewer_socket_id, peerConnection.localDescription)
    })
    .catch(err => {
      console.error('[BROADCAST] Error creando offer:', err)
      socket.emit('broadcast_error', { phase: 'createOffer', name: err.name, msg: err.message || err.toString() })
    })
}

//1) wait for the server to tell us to stream to another device
socket.on("stream_video_to_first_viewer", function(viewer_socket_id){
  console.log('[BROADCAST] Evento stream_video_to_first_viewer recibido para viewer:', viewer_socket_id)
  //2) get the video stream and store it in a variable to access later
  try {
    ensureMainStream().then(function(stream){
      console.log('[BROADCAST] ensureMainStream completado, llamando streamToViewer')
      streamToViewer(viewer_socket_id, stream, "video_stream_offer")
    }).catch(err => {
      console.error('[BROADCAST] Error en ensureMainStream promise:', err)
      socket.emit('broadcast_error', { phase: 'ensureMainStream', name: err.name, msg: err.message || err.toString() })
    })
  } catch(error) {
    console.error('[BROADCAST] Error accediendo a media devices:', error)
    socket.emit('broadcast_error', { phase: 'getDisplayMedia_sync', name: error.name, msg: error.message || error.toString() })
  }
})

socket.on("video_stream_answer", async function(viewer_socket_id, description){
  const peerConnection = peerConnections[viewer_socket_id]
  if(!peerConnection){
    console.warn('video_stream_answer without peerConnection', viewer_socket_id)
    return
  }
  try {
    await peerConnection.setRemoteDescription(description)
    await flushQueuedCandidates(viewer_socket_id)
  } catch (err) {
    console.error('setRemoteDescription failed', viewer_socket_id, err)
  }
})

//7) get any candidates from the remote viewer as well
socket.on("candidate", async function(viewer_socket_id, candidate){
  const rtcCandidate = new RTCIceCandidate(candidate)
  const peerConnection = peerConnections[viewer_socket_id]
  if(!peerConnection || !peerConnection.remoteDescription){
    queueCandidate(viewer_socket_id, rtcCandidate)
    return
  }
  try {
    await peerConnection.addIceCandidate(rtcCandidate)
  } catch (err) {
    console.error('candidate addIceCandidate failed', viewer_socket_id, err)
  }
})

//delete connections if we want them to
socket.on("disconnect_viewer", function(viewer_socket_id){
  if(peerConnections[viewer_socket_id]){
    peerConnections[viewer_socket_id].close()
  }
  delete peerConnections[viewer_socket_id]
  delete pendingCandidatesByViewer[viewer_socket_id]
})
      
    </script>
  </body>
</html>
