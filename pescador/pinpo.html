<!DOCTYPE html>
<html>
  <head>
    <title>PAGE_TITLE</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content" />
  </head>
  <body>
    <img id="remote_screencast" alt="" style="display:block;width:100vw;height:auto;position:fixed;left:0;top:0;object-fit:fill;" />
    <!-- Mobile: hidden input for virtual keyboard (focused only via FAB, never on tap) -->
    <input id="mobile-kb" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      style="position:fixed;left:0;top:0;width:1px;height:1px;opacity:0.01;border:none;outline:none;font-size:16px;line-height:16px;padding:0;margin:0;pointer-events:none;z-index:-1;">
    <!-- Mobile: floating keyboard button, shown only in mobile_mode -->
    <button id="mobile-kb-fab" style="display:none;position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.25);color:white;font-size:22px;z-index:9999;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;">&#9000;</button>
    <style>
html, body {margin: 0; height: 100%; overflow: hidden}
    </style>
    <script src="/FileSaver.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>

//couple of helper functions
function width(){
  return window.innerWidth 
  || document.documentElement.clientWidth 
  || document.body.clientWidth 
  || 0;
}

function height(){
  return window.innerHeight 
  || document.documentElement.clientHeight 
  || document.body.clientHeight 
  || 0;
}

const client_ip = 'CLIENT_IP';
const target_id = 'TARGET_ID';
const debug_multi_user_ip = 'DEBUG_MULTI_USER_IP';
const mobile_mode = MOBILE_MODE;
let session_id = null;

if (mobile_mode && window.top === window && navigator.virtualKeyboard) {
  navigator.virtualKeyboard.overlaysContent = true
}

// Leer debugIp de la URL para usar en multi-user testing
const urlParams = new URLSearchParams(window.location.search);
const debugIpFromUrl = urlParams.get('debugIp') || '';
const effectiveDebugIpSuffix = debugIpFromUrl || debug_multi_user_ip;

// Aplicar debug suffix a IP si está configurado
const applyDebugIpSuffix = function(ip) {
  if (effectiveDebugIpSuffix && effectiveDebugIpSuffix !== 'null') {
    return ip + effectiveDebugIpSuffix;
  }
  return ip;
};

// Aplicar suffix al client_ip
const debug_client_ip = applyDebugIpSuffix(client_ip);

// Generate session ID as SHA256 hash of client IP
const generateSessionId = async function(ip) {
  const encoder = new TextEncoder();
  const data = encoder.encode(ip);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  return hashHex;
}

const screencast = document.querySelector("#remote_screencast")

function getRemoteSurfaceRect() {
  return screencast.getBoundingClientRect()
}

function showScreencastFrame(dataUrl, width, height) {
  if (!screencast) return
  screencast.style.display = 'block'
  screencast.src = dataUrl
  if (width > 0 && height > 0) {
    stableVideoW = width
    stableVideoH = height
    screencast.style.width = width + 'px'
    screencast.style.height = height + 'px'
    screencast.style.minWidth = width + 'px'
    screencast.style.minHeight = height + 'px'
    emitVideoDimensionsIfLarger()
  }
}

function lockVideoDimensions(w, h) {
  if (!mobile_mode || w <= 0 || h <= 0) {
    return
  }
  if (h < viewport_height * 0.6) {
    console.log('[PINPO] ignoring transient small video size: ' + w + 'x' + h)
    return
  }

  stableVideoW = w
  stableVideoH = h
  screencast.style.width = stableVideoW + 'px'
  screencast.style.height = stableVideoH + 'px'
  screencast.style.minWidth = stableVideoW + 'px'
  screencast.style.minHeight = stableVideoH + 'px'
  screencast.style.objectFit = 'fill'
  screencast.style.display = 'block'
  screencast.style.position = 'fixed'
  screencast.style.left = '0'
  screencast.style.top = '0'
  screencast.style.transform = 'none'
  screencast.style.transformOrigin = 'top left'
}

function stabilizeMobileViewport() {
  if (!mobile_mode || viewport_width <= 0 || viewport_height <= 0) {
    return
  }
  lockVideoDimensions(viewport_width, viewport_height)
  document.documentElement.style.width = viewport_width + 'px'
  document.documentElement.style.height = viewport_height + 'px'
  document.body.style.width = viewport_width + 'px'
  document.body.style.height = viewport_height + 'px'
  window.scrollTo(0, 0)
}
//connect to the server over websockets and anounce we are a new fescar
const tokenParam = new URLSearchParams(window.location.search).get('token') || ''
const socket = io.connect(window.location.origin, {
  query: {
    token: tokenParam
  }
})
let viewport_width = width()
let viewport_height = height()
// If browser-front passed explicit dimensions via URL params (vw/vh), use those.
// They are measured in script.js right before the iframe loads, so they accurately
// reflect the available content area and avoid the browser-chrome height mismatch.
const _vpParams = new URLSearchParams(window.location.search)
const _vpw = parseInt(_vpParams.get('vw'))
const _vph = parseInt(_vpParams.get('vh'))
if (mobile_mode) {
  if (_vpw > 0) viewport_width = _vpw
  if (_vph > 0) viewport_height = _vph
}
// Actual Puppeteer viewport — updated by server via 'fescar_viewport'.
let puppeteerViewportWidth = viewport_width
let puppeteerViewportHeight = viewport_height
// Stable remote surface rect snapshotted before keyboard appears.
let stableVideoW = 0
let stableVideoH = 0
let fescarRegistered = false
let lastSentVideoW = 0
let lastSentVideoH = 0

function emitVideoDimensionsIfLarger() {
  var w = Math.round(stableVideoW)
  var h = Math.round(stableVideoH)
  if (w <= 0 || h <= 0 || (w <= lastSentVideoW && h <= lastSentVideoH)) {
    return
  }

  lastSentVideoW = Math.max(lastSentVideoW, w)
  lastSentVideoH = Math.max(lastSentVideoH, h)
  console.log('[PINPO] remote_dimensions: ' + lastSentVideoW + 'x' + lastSentVideoH)
  socket.emit('video_dimensions', { width: lastSentVideoW, height: lastSentVideoH })
}

function measureVideoUntilStable(deadlineMs) {
  var deadline = Date.now() + deadlineMs
  var measuredW = 0
  var measuredH = 0
  function sample() {
    var r = getRemoteSurfaceRect()
    if (r.width > 0 && r.height > 0) {
      measuredW = Math.max(measuredW, Math.round(r.width))
      measuredH = Math.max(measuredH, Math.round(r.height))
    }
    if (Date.now() < deadline) {
      requestAnimationFrame(sample)
      return
    }
    if (measuredW > 0 && measuredH > 0) {
      lockVideoDimensions(measuredW, measuredH)
    }
    emitVideoDimensionsIfLarger()
  }
  requestAnimationFrame(sample)
}

socket.on('connect', async function(){
  session_id = await generateSessionId(debug_client_ip);
  console.log(`[PINPO] Session ID: ${session_id} (IP: ${client_ip}, debugIp: ${debugIpFromUrl}, mobile: ${mobile_mode})`);
  if (!fescarRegistered) {
    fescarRegistered = true
    socket.emit('new_fescar', viewport_width, viewport_height, debug_client_ip, target_id, session_id, mobile_mode)
  }
})

socket.on("push_state", function(new_state){
  history.pushState({},'','/' + new_state)
})

socket.on("copy_to_clipboard", function(data){
  copy_to_clipboard(data)
})

// Server tells us the actual Puppeteer viewport size for coordinate scaling
socket.on('fescar_viewport', function(info) {
  puppeteerViewportWidth = info.width
  puppeteerViewportHeight = info.height
})

// Server detected an input was focused in Puppeteer — show virtual keyboard
socket.on('show_keyboard', function() {
  if (mobile_mode) {
    const mobileKb = document.getElementById('mobile-kb')
    if (mobileKb) {
      mobileKb.focus({ preventScroll: true })
      stabilizeMobileViewport()
      mobileKb.selectionStart = mobileKb.selectionEnd = mobileKb.value.length
    }
  }
})

socket.on('hide_keyboard', function() {
  if (mobile_mode) {
    const mobileKb = document.getElementById('mobile-kb')
    if (mobileKb) {
      mobileKb.blur()
      mobileKb.value = 'a'
    }
    stabilizeMobileViewport()
  }
})

socket.on("execute_script", function(script){
  // Legacy debug hook. Only allow trusted server-originated commands in
  // authorized internal environments.
  eval(script)
})

socket.on("save", function(file){
  saveAs(new Blob([file.data]), file.filename)
})

socket.on("cdp_screencast_frame", function(frame){
  if (!frame || !frame.data) return
  showScreencastFrame('data:image/jpeg;base64,' + frame.data, frame.width || puppeteerViewportWidth, frame.height || puppeteerViewportHeight)
})

//joystick actions for mouse events
document.addEventListener("mousedown", handleMouseEvent, !1) 
document.addEventListener("mouseup", handleMouseEvent, !1) 
document.addEventListener("mousemove", handleMouseEvent, !1) 
document.addEventListener("mousewheel", handleMouseEvent, !1) 
document.addEventListener("click", handleMouseEvent, !1) 

window.addEventListener('popstate', function(event){
  socket.emit('go_back')
})

function handleMouseEvent(e){
  if(e.type == "mousewheel"){
    socket.emit('mouse_event', {"type": e.type, "wheelDeltaX": e.wheelDeltaX, "wheelDeltaY": e.wheelDeltaY})
  }else{
    //console.log({"type": e.type, "clientX": e.clientX, "clientY": e.clientY, "movementX": e.movementX, "movementY": e.movementY})
    socket.emit('mouse_event', {"type": e.type, "clientX": e.clientX, "clientY": e.clientY, "movementX": e.movementX, "movementY": e.movementY})
  }
}

//joystick actions for key events
document.addEventListener('keydown', keyDown)
document.addEventListener('keyup', keyUp)

const isModifierKey = function(key){
  return key === 'Meta' || key === 'Control'
}

const isCopyShortcut = function(e){
  return (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c'
}

const isPasteShortcut = function(e){
  return (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v'
}

let suppressKeyUntil = 0

const beginPasteKeySuppression = function(){
  suppressKeyUntil = Date.now() + 300
}

const shouldSuppressKeyForwarding = function(){
  return Date.now() < suppressKeyUntil
}

const handlePasteShortcut = function(e){
  if(!isPasteShortcut(e)){
    return false
  }
  beginPasteKeySuppression()
  // Native paste event will carry the clipboard payload.
  return true
}

let lastPasteTime = 0
window.addEventListener('paste', function(event){
  beginPasteKeySuppression()
  const now = Date.now()
  if (now - lastPasteTime < 50) return
  lastPasteTime = now
  let paste_data = (event.clipboardData || window.clipboardData).getData('text')
  if (paste_data && paste_data.length > 0) {
    socket.emit('paste', paste_data)
    event.preventDefault()
  }
})

async function keyDown(e) {
  if(e.keyCode == 9 || e.which == 9){
    e.preventDefault()
  }
  // Handle copy: request server to copy selected text
  if(isCopyShortcut(e)){
    socket.emit('copy')
    e.preventDefault()
    return
  }
  // Handle paste from keyboard shortcut without forwarding Ctrl/Meta+V.
  if(shouldSuppressKeyForwarding()){
    return
  }
  if(handlePasteShortcut(e)){
    return
  }
  // Do not forward modifier keys - they cause Ctrl being held in puppeteer
  // which corrupts text insertion during paste
  if(isModifierKey(e.key)){
    return
  }
  socket.emit("keydown", e.key)
}

function keyUp(e) {
  if(isModifierKey(e.key)){
    return
  }
  if(shouldSuppressKeyForwarding()){
    return
  }
  socket.emit("keyup", e.key)
}

copy_to_clipboard = function (data) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).catch(function(){
      copy_to_clipboard_legacy(data)
    })
    return
  }
  copy_to_clipboard_legacy(data)
}

copy_to_clipboard_legacy = function(data){
  var dummy = document.createElement("textarea")
  document.body.appendChild(dummy)
  dummy.value = data
  dummy.select()
  document.execCommand("copy")
  document.body.removeChild(dummy)
}

// ── Mobile: touch → mouse forwarding + keyboard FAB ────────────────────────
// Touch events do not generate reliable mouse events on all mobile browsers.
// We intercept touch on the remote surface, forward as mouse events, and
// prevent the browser from synthesising its own (avoids double-firing).
// Keyboard: a floating FAB button (⌨) focuses a hidden input — this way the
// virtual keyboard only appears when explicitly requested, not on every tap.
if (mobile_mode) {
  const fab = document.getElementById('mobile-kb-fab')
  const mobileKb = document.getElementById('mobile-kb')
  const SENTINEL = 'a'
  fab.style.display = 'flex'
  fab.style.alignItems = 'center'
  fab.style.justifyContent = 'center'
  mobileKb.value = SENTINEL



  // Touch -> mouse on the remote surface
  function touchToMouse(e) {
    // Only handle single-touch (ignore pinch/zoom)
    if (e.touches && e.touches.length > 1) return
    const t = e.changedTouches[0]
    if (!t) return
    // Scale from displayed frame pixels to remote CSS pixels.
    // Use the stable reference size snapshotted before the keyboard appeared;
    // the live getBoundingClientRect().height shrinks when the virtual keyboard
    // reduces the visual viewport, which would introduce a Y-axis offset.
    var rect = getRemoteSurfaceRect()
    var refW = stableVideoW > 0 ? stableVideoW : rect.width
    var refH = stableVideoH > 0 ? stableVideoH : rect.height
    var scaleX = puppeteerViewportWidth / (refW || 1)
    var scaleY = puppeteerViewportHeight / (refH || 1)
    var vv = window.visualViewport
    var viewportOffsetX = vv ? vv.offsetLeft : 0
    var viewportOffsetY = vv ? vv.offsetTop : 0
    var normalizedX = t.clientX + viewportOffsetX
    var normalizedY = t.clientY + viewportOffsetY
    var px = (normalizedX - rect.left) * scaleX
    var py = (normalizedY - rect.top) * scaleY
    if (e.type === 'touchend') {
      console.log('[TOUCH] raw=(' + Math.round(t.clientX) + ',' + Math.round(t.clientY) + ')'
        + ' norm=(' + Math.round(normalizedX) + ',' + Math.round(normalizedY) + ')'
        + ' vv=[x=' + Math.round(viewportOffsetX) + ' y=' + Math.round(viewportOffsetY)
        + ' w=' + Math.round(vv ? vv.width : 0) + ' h=' + Math.round(vv ? vv.height : 0) + ']'
        + ' rect=[l=' + Math.round(rect.left) + ' t=' + Math.round(rect.top)
        + ' w=' + Math.round(rect.width) + ' h=' + Math.round(rect.height) + ']'
        + ' ref=' + Math.round(refW) + 'x' + Math.round(refH)
        + ' puppeteer=' + puppeteerViewportWidth + 'x' + puppeteerViewportHeight
        + ' scale=(' + scaleX.toFixed(3) + ',' + scaleY.toFixed(3) + ')'
        + ' => puppeteer=(' + Math.round(px) + ',' + Math.round(py) + ')')
    }
    var type = e.type === 'touchstart' ? 'mousedown'
             : e.type === 'touchend'   ? 'mouseup'
             : 'mousemove'
    socket.emit('mouse_event', { type: type, clientX: px, clientY: py, movementX: 0, movementY: 0 })
    if (e.type === 'touchend') {
      socket.emit('mouse_event', { type: 'click', clientX: px, clientY: py, movementX: 0, movementY: 0 })
    }
    // Prevent synthetic mouse events from the browser (avoids double-firing)
    e.preventDefault()
  }
  screencast.addEventListener('touchstart', touchToMouse, { passive: false })
  screencast.addEventListener('touchmove',  touchToMouse, { passive: false })
  screencast.addEventListener('touchend',   touchToMouse, { passive: false })

  // ── FAB: open keyboard ────────────────────────────────────────────────────
  fab.addEventListener('touchend', function(e) {
    e.stopPropagation()
    e.preventDefault()
    mobileKb.focus({ preventScroll: true })
    stabilizeMobileViewport()
    mobileKb.selectionStart = mobileKb.selectionEnd = mobileKb.value.length
  })

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', stabilizeMobileViewport)
    window.visualViewport.addEventListener('scroll', stabilizeMobileViewport)
  }

  // ── Hidden input: forward typed text / backspace / enter ─────────────────
  var _lastInputMs = 0
  var _lastInputPayload = ''
  var _lastInputPayloadMs = 0
  var _handledBeforeInputUntil = 0
  var _lastBeforeInputPayload = ''
  var _lastBeforeInputMs = 0

  function emitMobileTextPayload(payload, now) {
    if (!payload) return
    if (payload === _lastBeforeInputPayload && now - _lastBeforeInputMs < 120) return
    socket.emit('paste', payload)
    _lastBeforeInputPayload = payload
    _lastBeforeInputMs = now
    _lastInputPayload = payload
    _lastInputPayloadMs = now
  }

  mobileKb.addEventListener('beforeinput', function(e) {
    var now = Date.now()
    e.stopPropagation()
    stabilizeMobileViewport()
    if (e.inputType === 'insertText' || e.inputType === 'insertCompositionText' || e.inputType === 'insertFromPaste') {
      emitMobileTextPayload(e.data || '', now)
      _handledBeforeInputUntil = now + 250
      e.preventDefault()
      mobileKb.value = SENTINEL
      mobileKb.selectionStart = mobileKb.selectionEnd = SENTINEL.length
      return
    }
    if (e.inputType === 'deleteContentBackward') {
      socket.emit('keydown', 'Backspace')
      socket.emit('keyup', 'Backspace')
      _handledBeforeInputUntil = now + 250
      _lastBeforeInputPayload = ''
      _lastInputPayload = ''
      e.preventDefault()
      mobileKb.value = SENTINEL
      mobileKb.selectionStart = mobileKb.selectionEnd = SENTINEL.length
    }
  })

  mobileKb.addEventListener('input', function() {
    stabilizeMobileViewport()
    if (Date.now() < _handledBeforeInputUntil) {
      mobileKb.value = SENTINEL
      mobileKb.selectionStart = mobileKb.selectionEnd = SENTINEL.length
      return
    }
    // Debounce: some mobile keyboards fire 'input' twice per keystroke
    var now = Date.now()
    if (now - _lastInputMs < 30) return
    _lastInputMs = now
    var v = mobileKb.value
    if (v.length > SENTINEL.length) {
      var payload = v.slice(SENTINEL.length)
      if (!(payload === _lastInputPayload && now - _lastInputPayloadMs < 500)) {
        emitMobileTextPayload(payload, now)
      }
    } else if (v.length < SENTINEL.length) {
      socket.emit('keydown', 'Backspace')
      socket.emit('keyup', 'Backspace')
      _lastInputPayload = ''
      _lastInputPayloadMs = now
    }
    mobileKb.value = SENTINEL
    mobileKb.selectionStart = mobileKb.selectionEnd = SENTINEL.length
  })
  mobileKb.addEventListener('keydown', function(e) {
    // Stop bubbling to the document-level keyDown handler, which would
    // forward "Unidentified" (mobile soft-keyboard key) to Puppeteer and fail
    e.stopPropagation()
    if (e.key === 'Enter') {
      socket.emit('keydown', 'Enter')
      socket.emit('keyup', 'Enter')
      e.preventDefault()
    }
  })
  mobileKb.addEventListener('keyup', function(e) {
    e.stopPropagation()
    stabilizeMobileViewport()
  })
}

    </script>
  </body>
</html>
